<h2>Chat with {{ other_user.username }}</h2>

<div>
    {% for message in messages %}
        <p>
            <strong>{{ message.sender.username }}:</strong>
            {{ message.content }}
        </p>
    {% empty %}
        <p>No messages yet.</p>
    {% endfor %}
</div>

<form method="post">
    {% csrf_token %}
    <input type="text" name="content" placeholder="Type message">
    <button type="submit">Send</button>
</form>
